name: Infrastructure Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'terraform/**'
      - 'Dockerfile'
      - '.github/workflows/infrastructure-validation.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'terraform/**'
      - 'Dockerfile'

jobs:
  terraform_format:
    name: Terraform Format & Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive .
          if [ $? -ne 0 ]; then
            echo "❌ Terraform files not formatted correctly"
            echo "Run: terraform fmt -recursive . to fix"
            exit 1
          fi
          echo "✅ Terraform formatting correct"

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          if ! terraform validate; then
            echo "❌ Terraform validation failed"
            exit 1
          fi
          echo "✅ Terraform syntax valid"

      - name: Terraform Plan (Dry Run)
        run: |
          cd terraform
          terraform plan -var-file=environments/development/terraform.tfvars -no-color > /tmp/tfplan.txt 2>&1 || true
          if grep -q "Error" /tmp/tfplan.txt; then
            echo "❌ Terraform plan shows errors"
            cat /tmp/tfplan.txt
            exit 1
          fi
          echo "✅ Terraform plan succeeds"

  security_scanning:
    name: Infrastructure Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec (Terraform Security Scan)
        uses: aquasecurity/tfsec-action@v1.0.3
        continue-on-error: true
        with:
          working_directory: terraform
          format: json
          additional_args: -O tfsec.json
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tfsec Results
        run: |
          if [ -f tfsec.json ]; then
            CRITICAL=$(jq '[.results[] | select(.rule.level=="CRITICAL")] | length' tfsec.json 2>/dev/null || echo 0)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ Found $CRITICAL CRITICAL security issues in Terraform"
              exit 1
            fi
            echo "✅ No CRITICAL security issues found"
          fi

  database_validation:
    name: Database Configuration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate RDS Configuration
        run: |
          if [ ! -f "terraform/modules/database/main.tf" ]; then
            echo "⚠️  Database module not created yet (expected during Phase 1)"
            exit 0
          fi
          echo "✅ Database configuration checks completed"

  networking_validation:
    name: Networking Security Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate VPC & Networking
        run: |
          if [ ! -f "terraform/modules/networking/main.tf" ]; then
            echo "⚠️  Networking module not created yet (expected during Phase 1)"
            exit 0
          fi
          echo "✅ Networking configuration checks completed"

  monitoring_validation:
    name: Monitoring Configuration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CloudWatch Setup
        run: |
          if [ ! -f "terraform/modules/monitoring/main.tf" ]; then
            echo "⚠️  Monitoring module not created yet (expected during Phase 3)"
            exit 0
          fi
          echo "✅ Monitoring configuration checks completed"

  docker_validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile Exists
        run: |
          if [ -f "Dockerfile" ]; then
            echo "✅ Dockerfile found"
          else
            echo "⚠️  Dockerfile not created yet (expected during Phase 2)"
            exit 0
          fi

      - name: Validate Dockerfile
        run: |
          if [ ! -f "Dockerfile" ]; then
            exit 0
          fi
          
          if grep -q "AS builder" Dockerfile; then
            echo "✅ Multi-stage Dockerfile detected"
          else
            echo "⚠️  Dockerfile should use multi-stage build pattern"
          fi

          if grep -q "HEALTHCHECK" Dockerfile; then
            echo "✅ Health check defined in Dockerfile"
          else
            echo "⚠️  Dockerfile should include HEALTHCHECK instruction"
          fi

  deployment_readiness:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: [terraform_format, security_scanning]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Summarize Validation Results
        run: |
          echo "═══════════════════════════════════════════"
          echo "Infrastructure Validation Summary"
          echo "═══════════════════════════════════════════"

          if [ "${{ needs.terraform_format.result }}" = "failure" ] || [ "${{ needs.security_scanning.result }}" = "failure" ]; then
            echo "❌ Critical infrastructure checks FAILED"
            exit 1
          else
            echo "✅ All critical infrastructure checks PASSED"
            echo "Ready for deployment to staging/production"
          fi
