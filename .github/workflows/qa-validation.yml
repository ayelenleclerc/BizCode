name: QA Validation

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'e2e/**'
      - 'server/**'
      - 'perf/**'
      - 'prisma/**'
      - 'docker-compose.postgres.yml'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/qa-validation.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'e2e/**'
      - 'server/**'
      - 'perf/**'
      - 'prisma/**'
      - 'docker-compose.postgres.yml'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/qa-validation.yml'

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm run test 2>&1 | tee test-results.log

      - name: Generate coverage report
        run: npm run test:coverage 2>&1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Check coverage thresholds
        run: |
          COVERAGE=$(grep -oP '(?<=Lines\s+:\s)\d+(?=\.)' coverage/coverage-summary.json | head -1)
          if [ -z "$COVERAGE" ] || [ "$COVERAGE" -lt 75 ]; then
            echo "⚠️ Coverage below 75%: $COVERAGE%"
            echo "Note: Target is ≥90% on critical modules, ≥75% average"
          else
            echo "✅ Coverage acceptable: $COVERAGE%"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.log

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bizcode_test
          POSTGRES_USER: test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test@localhost:5432/bizcode_test?sslmode=disable
        run: npx prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test@localhost:5432/bizcode_test?sslmode=disable
          NODE_ENV: test
        run: npm run test:integration

  e2e_tests:
    name: E2E Tests (Subset)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bizcode_test
          POSTGRES_USER: test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium + OS deps)
        run: npx playwright install --with-deps chromium

      - name: Ephemeral SuperAdmin seed credential for E2E (generated in runner only)
        run: |
          E2E_PW="ci$(openssl rand -hex 16)"
          echo "BIZCODE_SEED_SUPERADMIN_PASSWORD=$E2E_PW" >> $GITHUB_ENV
          echo "::add-mask::$E2E_PW"

      - name: Prisma generate, migrate, seed
        env:
          DATABASE_URL: postgresql://test@localhost:5432/bizcode_test?sslmode=disable
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start API for E2E (background)
        env:
          DATABASE_URL: postgresql://test@localhost:5432/bizcode_test?sslmode=disable
        run: |
          npm run server &
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3001/api/health >/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy in time"
          exit 1

      - name: Run E2E tests (critical paths only)
        env:
          DATABASE_URL: postgresql://test@localhost:5432/bizcode_test?sslmode=disable
        run: npm run test:e2e

      - name: Flaky test detection hint
        if: always()
        run: |
          {
            echo "### Flaky tests"
            echo "Locally run npm run test:e2e:repeat to execute each Playwright spec three times."
            echo "CI uses retries on Chromium when CI is set (see playwright.config.ts)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  accessibility_tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium + OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests (Vitest + jest-axe)
        run: npm run test:a11y

      - name: Check ESLint a11y rules
        run: |
          if npx eslint src/ --ext .tsx --plugin jsx-a11y 2>/dev/null | grep -q "error"; then
            echo "❌ Accessibility violations found"
            npx eslint src/ --ext .tsx --plugin jsx-a11y
            exit 1
          fi
          echo "✅ No ESLint a11y violations"

  test_coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit_tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Parse coverage metrics
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | grep -E '"(lines|functions|branches|statements)"' >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'))
              const total = coverage.total
              
              let comment = '## Code Coverage Report\n\n'
              comment += `| Metric | Coverage |\n`
              comment += `|--------|----------|\n`
              comment += `| Lines | ${total.lines.pct.toFixed(2)}% |\n`
              comment += `| Statements | ${total.statements.pct.toFixed(2)}% |\n`
              comment += `| Functions | ${total.functions.pct.toFixed(2)}% |\n`
              comment += `| Branches | ${total.branches.pct.toFixed(2)}% |\n`
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              })
            }

  test_summary:
    name: QA Test Summary
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests, e2e_tests, accessibility_tests]
    if: always()
    steps:
      - name: Determine QA Status
        run: |
          echo "## QA Validation Summary"
          echo ""
          echo "✅ Unit Tests: ${{ needs.unit_tests.result }}"
          echo "✅ Integration Tests: ${{ needs.integration_tests.result }}"
          echo "✅ E2E Tests: ${{ needs.e2e_tests.result }}"
          echo "✅ Accessibility Tests: ${{ needs.accessibility_tests.result }}"
          echo ""
          
          FAILED=0
          if [ "${{ needs.unit_tests.result }}" == "failure" ]; then
            FAILED=$((FAILED+1))
          fi
          if [ "${{ needs.integration_tests.result }}" == "failure" ]; then
            FAILED=$((FAILED+1))
          fi
          if [ "${{ needs.e2e_tests.result }}" == "failure" ]; then
            FAILED=$((FAILED+1))
          fi
          if [ "${{ needs.accessibility_tests.result }}" == "failure" ]; then
            FAILED=$((FAILED+1))
          fi
          
          if [ "$FAILED" -gt 0 ]; then
            echo "FAIL: $FAILED test suite(s) failed (unit, integration, E2E, or a11y)"
            exit 1
          else
            echo "OK: All QA test suites passed"
          fi

      - name: Comment PR with QA Status
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const status = {
              unit: '${{ needs.unit_tests.result }}',
              integration: '${{ needs.integration_tests.result }}',
              e2e: '${{ needs.e2e_tests.result }}',
              a11y: '${{ needs.accessibility_tests.result }}'
            }
            
            const allPassed = Object.values(status).every(s => s !== 'failure')
            const emoji = allPassed ? '✅' : '❌'
            
            let comment = `${emoji} **QA Validation Results**\n\n`
            comment += `| Test Suite | Status |\n`
            comment += `|-----------|--------|\n`
            comment += `| Unit Tests | ${status.unit === 'success' ? '✅' : status.unit === 'skipped' ? '⊘' : '❌'} |\n`
            comment += `| Integration | ${status.integration === 'success' ? '✅' : status.integration === 'skipped' ? '⊘' : '❌'} |\n`
            comment += `| E2E (Critical Paths) | ${status.e2e === 'success' ? '✅' : status.e2e === 'skipped' ? '⊘' : '❌'} |\n`
            comment += `| Accessibility | ${status.a11y === 'success' ? '✅' : status.a11y === 'skipped' ? '⊘' : '❌'} |\n`
            comment += `\n**Target:** Unit ≥90%, Integration ≥75%, E2E ≥6 paths, A11y 100%`
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

  reference_issues:
    name: Reference QA GitHub Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Comment with QA Issues
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### QA Implementation Roadmap\n\n**Related Issues (P0 Critical):**\n- #250: Test strategy & coverage targets\n- #251: E2E critical path tests (Playwright)\n- #252: Integration API tests\n- #253: Accessibility automation (axe-core)\n- #254: Visual regression testing\n- #255: Performance testing (load/stress)\n- #256: Test environment setup (dev/staging/prod parity)\n- #257: Test data fixtures & database seeding\n- #258: Coverage reporting & metrics dashboard\n- #259: Manual testing procedures & checklist\n- #260: Flaky test detection & quarantine\n- #261: Security testing (SAST/DAST)\n- #262: Pre-commit test hooks\n- #263: CI/CD test gates\n- #264: Automated a11y testing\n\nDocs: docs/en/quality/testing-strategy.md, docs/en/quality/test-environments-parity.md`
            })
