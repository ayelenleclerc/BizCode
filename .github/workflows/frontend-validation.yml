name: Frontend Quality Validation

permissions:
  contents: read
  actions: write

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'server/**'
      - 'prisma/**'
      - 'tests/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/frontend-validation.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'server/**'
      - 'prisma/**'
      - 'tests/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/frontend-validation.yml'

jobs:
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bizcode
          POSTGRES_DB: bizcode_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bizcode@localhost:5432/bizcode_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint with jsx-a11y
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Check component sizes (Issue #102)
        run: |
          LARGE=$(find src/pages -name "*.tsx" -exec wc -l {} + | awk '$1 > 200 {print $2 " (" $1 " lines)"}')
          if [ ! -z "$LARGE" ]; then
            echo "⚠️ Large page components found (Issue #102):"
            echo "$LARGE"
          fi

      - name: Check for error boundaries (Issue #101)
        run: |
          if grep -r "ErrorBoundary" src/App.tsx > /dev/null; then
            echo "✅ ErrorBoundary found in App"
          else
            echo "⚠️ ErrorBoundary not implemented (Issue #101)"
          fi

      - name: Check for custom hooks (Issue #103)
        run: |
          HOOKS=0
          if [ -d src/hooks ]; then
            HOOKS=$(find src/hooks -name "*.ts" -print | wc -l)
          fi
          echo "✅ Found $HOOKS custom hooks"
          if [ $HOOKS -lt 3 ]; then
            echo "⚠️ Low number of custom hooks (Issue #103)"
          fi

      - name: Check for UI components (Issue #102)
        run: |
          COMPONENTS=0
          if [ -d src/components/ui ]; then
            COMPONENTS=$(find src/components/ui -name "*.tsx" -print | wc -l)
          fi
          echo "✅ Found $COMPONENTS UI components"
          if [ $COMPONENTS -lt 8 ]; then
            echo "⚠️ Component library incomplete (Issue #102)"
          fi

      - name: Check for loading states (Issue #105)
        run: |
          SKELETONS=$( { grep -r "Skeleton\|LoadingSpinner" src/pages --include="*.tsx" 2>/dev/null || true; } | wc -l )
          echo "✅ Found $SKELETONS loading state implementations"
          if [ $SKELETONS -lt 5 ]; then
            echo "⚠️ Low loading state coverage (Issue #105)"
          fi

      - name: Check for error handling (Issue #101)
        run: |
          HANDLERS=$( { grep -r "catch.*error\|try.*{" src/pages --include="*.tsx" 2>/dev/null || true; } | wc -l )
          echo "✅ Found $HANDLERS error handling blocks"

      - name: Verify i18n coverage
        run: npm run check:i18n

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Ephemeral SuperAdmin seed credential for E2E (generated in runner only)
        run: |
          E2E_PW="ci$(openssl rand -hex 16)"
          echo "BIZCODE_SEED_SUPERADMIN_PASSWORD=$E2E_PW" >> $GITHUB_ENV
          echo "::add-mask::$E2E_PW"

      - name: Prisma migrate and seed (E2E needs API + SuperAdmin)
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start API for E2E (background)
        run: |
          npm run server &
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3001/api/health >/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy in time"
          exit 1

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

      - name: Report Frontend Status
        if: always()
        run: |
          echo "## Frontend Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "- Error boundaries: Issue #101" >> $GITHUB_STEP_SUMMARY
          echo "- UI components: Issue #102" >> $GITHUB_STEP_SUMMARY
          echo "- Custom hooks: Issue #103" >> $GITHUB_STEP_SUMMARY
          echo "- E2E tests: Issue #104" >> $GITHUB_STEP_SUMMARY
          echo "- Loading states: Issue #105" >> $GITHUB_STEP_SUMMARY
          echo "- Form validation: Issue #106" >> $GITHUB_STEP_SUMMARY
          echo "- Page refactoring: Issue #107" >> $GITHUB_STEP_SUMMARY
          echo "- Storybook: Issue #108" >> $GITHUB_STEP_SUMMARY
          echo "- a11y testing: Issue #109" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: Issue #110" >> $GITHUB_STEP_SUMMARY
