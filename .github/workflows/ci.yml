name: CI Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bizcode
          POSTGRES_DB: bizcode_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bizcode@localhost:5432/bizcode_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (informational, non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database schema
        run: |
          set -euo pipefail
          if [ -d prisma/migrations ] && [ -n "$(ls -A prisma/migrations 2>/dev/null)" ]; then
            echo "Applying Prisma migrations..."
            npx prisma migrate deploy
          else
            echo "No Prisma migrations found; syncing schema with db push for CI test database..."
            npx prisma db push --skip-generate
          fi

      - name: TypeScript type-check
        run: npm run type-check

      - name: Validate OpenAPI specification
        run: npm run check:openapi

      - name: Generate documentation (TypeDoc, OpenAPI MD, schemas, SBOM)
        run: npm run docs:generate

      - name: Verify generated docs match committed files
        run: |
          set -euo pipefail

          # Deterministic drift check for generated docs and OpenAPI markdown.
          git diff --exit-code -- docs/generated docs/api/openapi-reference.generated.md

          # SBOM includes volatile fields (serialNumber/timestamp) that change every run.
          node - <<'NODE'
          const { execSync } = require('node:child_process')
          const { readFileSync } = require('node:fs')

          function normalizeSbom(raw) {
            const json = JSON.parse(raw)
            delete json.serialNumber
            if (json.metadata && typeof json.metadata === 'object') {
              delete json.metadata.timestamp
              // npm version embedded in tools.components varies across environments.
              delete json.metadata.tools
            }
            return JSON.stringify(json, null, 2)
          }

          const generatedRaw = readFileSync('docs/evidence/sbom-cyclonedx.json', 'utf8')
          const committedRaw = execSync('git show HEAD:docs/evidence/sbom-cyclonedx.json', {
            encoding: 'utf8',
          })

          const generated = normalizeSbom(generatedRaw)
          const committed = normalizeSbom(committedRaw)

          if (generated !== committed) {
            console.error(
              'SBOM drift detected (excluding volatile fields: serialNumber, metadata.timestamp).'
            )
            process.exit(1)
          }
          NODE

      - name: ESLint (jsx-a11y y TypeScript — cero advertencias)
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: i18n parity check
        run: npm run check:i18n

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Ephemeral SuperAdmin password for E2E
        run: |
          E2E_PW="ci$(openssl rand -hex 16)"
          echo "BIZCODE_SEED_SUPERADMIN_PASSWORD=$E2E_PW" >> $GITHUB_ENV
          echo "::add-mask::$E2E_PW"

      - name: Seed database for E2E (SuperAdmin login)
        env:
          BIZCODE_SEED_FIXTURE_CATALOG: 'true'
        run: npx prisma db seed

      - name: Start API for E2E (background)
        run: |
          npm run server &
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3001/api/health >/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy in time"
          exit 1

      - name: E2E smoke (Playwright)
        run: npm run test:e2e

      - name: Integration tests (PostgreSQL + Prisma)
        run: npm run test:integration

      - name: Documentation locale map check
        run: npm run check:docs-map

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # NOTE: Tauri desktop build is NOT included in CI.
  # It requires platform-native WebKit (libwebkit2gtk on Linux, WebView2 on Windows)
  # and a display server for rendering. This is documented in docs/quality/CI_CD.md.
  # Desktop builds should be triggered manually or via a separate workflow
  # with a self-hosted runner that has the required dependencies installed.
