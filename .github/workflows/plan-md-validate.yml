name: Plan markdown validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

jobs:
  plan-validate:
    name: Validate Cursor plan fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: plan:validate
        run: npm run plan:validate
