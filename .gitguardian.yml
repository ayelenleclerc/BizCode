version: 2

# Cursor rules contain illustrative Docker/compose snippets. They are not deployed secrets;
# scanning them creates noisy false positives vs real leaks in app code.
paths-ignore:
  - ".cursor/**"

# False-positive allowlist for GitGuardian Generic Password detector.
# The pattern below matches a Zod schema field declaration, not a real credential.
matches-ignore:
  - name: "Zod schema: password field validator (not a credential)"
    regex: "password: isNew \\? z\\.string"
  - name: "GitHub Actions secret reference (value not in repository)"
    regex: "\\$\\{\\{\\s*secrets\\.[^}]+\\}\\}"
