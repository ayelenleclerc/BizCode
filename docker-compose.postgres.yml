# Optional PostgreSQL 16 for local dev / integration parity with CI (see docs/en/quality/test-environments-parity.md).
# Usage: docker compose -f docker-compose.postgres.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bizcode_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bizcode_dev']
      interval: 5s
      timeout: 5s
      retries: 5
